<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>FOO Food Delivery</title>
</head>
<body>
    <header class="header">
        <div class="header__logo logo">
            <img src="chef-hat (2) 1.png" alt="Logo" class="logo__img">
            <p class="logo__text">FOO</p>
        </div> 
        
        <nav class="header__nav">
            <a href="#" class="header__link">Home</a>
            <a href="#" class="header__link">Menu</a>
            <a href="#" class="header__link">Contact</a>
            <a href="#" class="header__link">Shop</a>
        </nav>
        
        <div class="header__actions actions-panel">
            <div class="actions-panel__search">
                <img src="Vector.png" alt="Search">
                <p>Search</p>
            </div>
            <div class="actions-panel__cart cart">
                <img src="Shopping cart.png" alt="Cart">
                <div class="cart__badge">2</div>
            </div>
        </div>
    </header>

    <main class="hero">
        <div class="hero__container">
            <div class="hero__content">
                <h1 class="hero__title">
                    <span class="hero__title--orange">Fast</span> 
                    <div class="hero__title-group">
                        Food <br> Delivery
                    </div>
                </h1>
                
                <p class="hero__description">
                    Sed ut perspiciatis unde omnis iste natus sit 
                    voluptatem accusantium doloremque laudantium.
                </p>
                
                <div class="hero__buttons">
                    <button class="hero__btn hero__btn--order">Order Now</button>
                    <div class="hero__video-link">
                        <img src="Group 2.png" alt="Play">
                        <span>Watch Video</span> 
                    </div>
                </div>

                <div class="hero__assessment">
                    <img src="Group 3.png" alt="Rating">
                </div>
            </div>

            <div class="hero__image-box">
                <img src="17372 [Converted] 1.png" alt="Burger" class="hero__main-img">
            </div>
        </div>
    </main>
</body>
</html>
